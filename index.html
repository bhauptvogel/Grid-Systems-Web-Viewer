<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Grid Systems</title>
		<link rel="stylesheet" href="./src/styles/ui.css" />
		<style>
			html, body {
				margin: 0;
				padding: 0;
				height: 100%;
				overflow: hidden; /* Prevents scrolling */
			}
		</style>
  </head>
  <body>
		<!-- ─── MAP ─── -->
    <div id="map" style="width: 100vw; height: 100vh;"></div>

		<!-- ─── TOOL BUTTONS ─── -->
		<div id="panel-tools" class="ui-panel">
			<button id="btnSearch"  title="Search"   class="tool-btn">
				<img src="/src/assets/search.svg"    alt="Search">
			</button>
			<button id="btnLine"    title="Draw line"   class="tool-btn">
				<img src="/src/assets/line.svg"      alt="Draw line">
			</button>
			<button id="btnPoly"    title="Draw polygon" class="tool-btn">
				<img src="/src/assets/polygon.svg"   alt="Draw polygon">
			</button>
			<button id="btnRect"    title="Draw rectangle" class="tool-btn">
				<img src="/src/assets/rectangle.svg" alt="Draw rectangle">
			</button>
			<button id="btnCircle"  title="Draw circle" class="tool-btn">
				<img src="/src/assets/circle.svg"    alt="Draw circle">
			</button>
			<button id="btnUpload"  title="Upload GeoJSON" class="tool-btn">
				<img src="/src/assets/upload.svg"    alt="Upload GeoJSON">
			</button>
			<button id="btnReset"  title="Reset the Drawing" class="tool-btn">
				<img src="/src/assets/trash.svg"    alt="Reset the Drawing">
			</button>
		</div>

		<!-- ─── GRID SELECTOR ─── -->
		<div id="panel-grid" class="ui-panel">
			<label class="ui-field">
				<select id="gridSelect">
					<option value="slippy">Slippy Tiles</option>
					<option value="geohash">Geohash</option>
					<option value="h3">Uber H3</option>
					<option value="quadtree">Quadtree</option>
				</select>
			</label>
		</div>

		<!-- ─── HOVER LABEL ─── -->
		<div id="panel-hover" class="ui-panel">
			<span id="hoverLabel" class="ui-hover">Hover a cell</span>
		</div>

		<!-- ─── SELECTED LIST INPUT ─── -->
		<div id="panel-list" class="ui-panel">
			<label class="ui-field">
				<span class="ui-label">Selection:</span>
				<textarea rows="1" id="cellInput" placeholder="cell1,cell2,…" spellcheck="false"></textarea>
			</label>
			<div id="multiTip" class="ui-tip">
				Tip: hold <kbd>Ctrl</kbd> and click to select multiple tiles
			</div>
			
			<!-- ─── BUTTON ROW ─── -->
			<div class="ui-buttons">
				<button id="btnCopy">Copy to Clipboard</button>
				<!-- <button id="btnLoad">Load from file</button>
				<button id="btnExport">Export</button> -->
			</div>
		</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
